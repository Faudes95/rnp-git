name: staging-postgres-rollout

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  postgres-staging:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - full
          - quirofano
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      BASE_URL: http://127.0.0.1:8000
      AUTH_ENABLED: "true"
      AUTH_USER: Faudes
      AUTH_PASS: "1995"
      IMSS_USER: Faudes
      IMSS_PASS: "1995"
      APP_BOOT_PROFILE: ${{ matrix.profile }}
      DATABASE_PLATFORM_TARGET: postgres
      STARTUP_INTERCONEXION_MODE: off
      AI_WARMUP_MODE: off
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/uromed_clinical
      SURGICAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/uromed_surgical
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install --no-fund --no-audit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Prepare PostgreSQL databases
        run: |
          python - <<'PY'
          import psycopg2
          admin = psycopg2.connect("postgresql://postgres:postgres@127.0.0.1:5432/postgres")
          admin.autocommit = True
          with admin.cursor() as cur:
              cur.execute("DROP DATABASE IF EXISTS uromed_clinical")
              cur.execute("DROP DATABASE IF EXISTS uromed_surgical")
              cur.execute("CREATE DATABASE uromed_clinical")
              cur.execute("CREATE DATABASE uromed_surgical")
          admin.close()
          PY

      - name: Start UROMED
        run: |
          mkdir -p artifacts
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > artifacts/app-${{ matrix.profile }}-postgres.log 2>&1 &
          python - <<'PY'
          import time
          import urllib.request
          url = "http://127.0.0.1:8000/status"
          for _ in range(180):
              try:
                  with urllib.request.urlopen(url, timeout=2) as resp:
                      if resp.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("App no respondió en /status")
          PY

      - name: Review/apply SQL assets
        if: matrix.profile == 'full'
        run: |
          python scripts/db_platform_pipeline.py review --dsn "$DATABASE_URL" --json > artifacts/db-platform-review-before.json
          python scripts/db_platform_pipeline.py apply --dsn "$DATABASE_URL" --asset materialized_views --asset migration_vector --json > artifacts/db-platform-apply.json
          python scripts/db_platform_pipeline.py review --dsn "$DATABASE_URL" --json > artifacts/db-platform-review-after.json

      - name: Assert database status
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request

          creds = f"{os.environ['AUTH_USER']}:{os.environ['AUTH_PASS']}".encode()
          headers = {"Authorization": "Basic " + base64.b64encode(creds).decode()}
          req = urllib.request.Request("http://127.0.0.1:8000/api/v1/database/status", headers=headers)
          with urllib.request.urlopen(req, timeout=10) as resp:
              payload = json.load(resp)
          assert payload["target_mode"] == "postgres", payload
          assert payload["clinical"]["mode"] == "postgres", payload
          assert payload["surgical"]["mode"] == "postgres", payload
          PY

      - name: Run full staging validation
        if: matrix.profile == 'full'
        run: npm run e2e:staging:full

      - name: Run quirofano staging validation
        if: matrix.profile == 'quirofano'
        run: npm run e2e:staging:quirofano

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-postgres-${{ matrix.profile }}
          path: |
            playwright-report
            artifacts
            docs
            test-results
