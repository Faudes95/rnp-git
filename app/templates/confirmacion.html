
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="/static/css/fonts_offline.css" rel="stylesheet">
    <link href="/static/css/rnp_ui_system.css" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f6f9; text-align: center; padding-top: 50px; margin: 0; }
        .card { background: white; max-width: 600px; margin: auto; padding: 50px; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-top: 8px solid #13322B; }
        h1 { color: #13322B; }
        h3 { color: #B38E5D; }
        .links { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:24px; }
        a { display: inline-block; padding: 12px 20px; background: #13322B; color: white; text-decoration: none; border-radius: 5px; }
        a.alt { background: #B38E5D; color: #fff; }
    </style>
    <style>
    /* === RNP Additive UI Enhancements === */
    .nav-chip { transition: all 0.2s ease; }
    .nav-chip:hover { background: #edf8f3; border-color: #3da68f; transform: translateY(-1px); }
    table tbody tr:nth-child(even) { background: #f8faf9; }
    table tbody tr:hover { background: rgba(179,142,93,0.08); transition: background 0.18s; }
    .btn, button[type="submit"] { transition: all 0.2s ease; }
    .btn:hover, button[type="submit"]:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(19,50,43,0.25); }
    input:focus, select:focus, textarea:focus { border-color: #B38E5D; outline: none; box-shadow: 0 0 0 3px rgba(179,142,93,0.15); }
    @media print { .global-nav, .breadcrumbs { display: none; } body { background: #fff; } }
    </style>
</head>
<body>
    <div class="card">
        <h1>REGISTRO GUARDADO</h1>
        <p><strong>PACIENTE:</strong> {{ nombre }}</p>
        <p><strong>DX:</strong> {{ diag }}</p>
        <h3>{{ msg_estatus }}</h3>
        {% if inconsistencias %}
        <div style="margin-top:20px; padding:15px; background:#fff8e1; border:1px solid #f0c36d; border-radius:10px; text-align:left;">
            <strong>Advertencias clínicas:</strong>
            <ul>
            {% for item in inconsistencias %}
                <li>{{ item }}</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}
        <div class="links">
            <a href="/">INICIO</a>
            {% if return_to %}
            <a class="alt" href="{{ return_to }}">VOLVER</a>
            {% endif %}
            <a class="alt" href="/consulta_externa">CONSULTA EXTERNA</a>
        </div>
    </div>
</body>
</html>
