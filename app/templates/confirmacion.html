
<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <link href="/static/css/fonts_offline.css" rel="stylesheet">
 <link href="/static/css/rnp_ui_system.css" rel="stylesheet">
 <style>
 body { font-family: 'Montserrat', sans-serif; background-color: #f4f6f9; text-align: center; padding-top: 50px; margin: 0; }
 .card { background: white; max-width: 600px; margin: auto; padding: 50px; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-top: 8px solid #0a3161; }
 h1 { color: #0a3161; }
 h3 { color: #c82f3f; }
 .links { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:24px; }
 a { display: inline-block; padding: 12px 20px; background: #0a3161; color: white; text-decoration: none; border-radius: 5px; }
 a.alt { background: #c82f3f; color: #fff; }
 </style>
 <style>
 /* === UROMED Additive UI Enhancements === */
 .nav-chip { transition: all 0.2s ease; }
 .nav-chip:hover { background: #f3f8ff; border-color: #74abf5; transform: translateY(-1px); }
 table tbody tr:nth-child(even) { background: #f8fbff; }
 table tbody tr:hover { background: rgba(200,47,63,0.06); transition: background 0.18s; }
 .btn, button[type="submit"] { transition: all 0.2s ease; }
 .btn:hover, button[type="submit"]:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(31,79,159,0.25); }
 input:focus, select:focus, textarea:focus { border-color: #c82f3f; outline: none; box-shadow: 0 0 0 3px rgba(200,47,63,0.12); }
 @media print { .global-nav, .breadcrumbs { display: none; } body { background: #fff; } }
 </style>
</head>
<body>
 <div class="card">
 <h1>REGISTRO GUARDADO</h1>
 <p><strong>PACIENTE:</strong> {{ nombre }}</p>
 <p><strong>DX:</strong> {{ diag }}</p>
 <h3>{{ msg_estatus }}</h3>
 {% if inconsistencias %}
 <div style="margin-top:20px; padding:15px; background:#fff4f6; border:1px solid #ef7f8b; border-radius:10px; text-align:left;">
 <strong>Advertencias clínicas:</strong>
 <ul>
 {% for item in inconsistencias %}
 <li>{{ item }}</li>
 {% endfor %}
 </ul>
 </div>
 {% endif %}
 <div class="links">
 <a href="/">INICIO</a>
 {% if return_to %}
 <a class="alt" href="{{ return_to }}">VOLVER</a>
 {% endif %}
 <a class="alt" href="/consulta_externa">CONSULTA EXTERNA</a>
 </div>
 </div>
</body>
</html>
